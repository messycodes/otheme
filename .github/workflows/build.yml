name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant permission
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          OTHEME_KEYSTORE_PATH: ${{ github.workspace }}/otheme.jks
          OTHEME_KEYSTORE_PASSWORD: "3442681588Mc/"
          OTHEME_KEY_ALIAS: otheme
          OTHEME_KEY_PASSWORD: "3442681588Mc/"
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OTheme-release
          path: |
            app/build/outputs/apk/release/*.apk
